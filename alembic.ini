# ==============================================================================
# Alembic Configuration File
# ==============================================================================
[alembic]
# Path to migration scripts directory
script_location = migrations

# Template for new migration files
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file timestamps
timezone = UTC

# Maximum length of migration message slug
truncate_slug_length = 40

# Database connection — loaded dynamically from app settings in env.py
# sqlalchemy.url is set programmatically; leave empty here.
sqlalchemy.url =

[post_write_hooks]
# No post-write hooks configured

[loggers]
keys = root, sqlalchemy, alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
