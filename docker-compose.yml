# ==============================================================================
# Serena Backend — Docker Compose
#
# Services:
#   serena_api      — FastAPI application
#   celery_worker   — Background task processor (emotional analysis)
#   redis           — Message broker for Celery
#
# Database Note:
#   PostgreSQL runs on the HOST machine (not in Docker). We use
#   extra_hosts to map host.docker.internal → host gateway so containers
#   can reach localhost:5432 on the host.
#
#   IMPORTANT (Linux only): You must allow Docker subnet in pg_hba.conf:
#     host  all  all  172.17.0.0/16  scram-sha-256
#   And set listen_addresses = '*' in postgresql.conf, then restart pg.
# ==============================================================================

version: "3.9"

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  env_file: .env
  extra_hosts:
    # Allows containers to reach PostgreSQL running on the host machine
    - "host.docker.internal:host-gateway"
  depends_on:
    redis:
      condition: service_healthy
  restart: unless-stopped

services:

  # ---- FastAPI Application ----
  serena_api:
    <<: *app-common
    container_name: serena_api
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      # Hot-reload: mount source code during development
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---- Celery Worker (post-session emotional analysis) ----
  celery_worker:
    <<: *app-common
    container_name: serena_celery_worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app

  # ---- Redis (Celery broker + result backend) ----
  redis:
    image: redis:7.2-alpine
    container_name: serena_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  redis_data:
    driver: local
