# ==============================================================================
# Serena Backend — Docker Compose (desarrollo local)
#
# Services:
#   postgres        — Base de datos PostgreSQL local
#   redis           — Message broker para Celery
#   serena_api      — FastAPI application
#   celery_worker   — Background task processor (emotional analysis)
#
# Cloudinary se consume como servicio externo (no requiere contenedor).
# ==============================================================================

version: "3.9"

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
    target: runtime
  env_file: .env
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    db:
      condition: service_healthy
  restart: unless-stopped

services:

  # ---- PostgreSQL (local) ----
  postgres:
    image: postgres:16-alpine
    container_name: serena_postgres
    environment:
      POSTGRES_USER: serena
      POSTGRES_PASSWORD: serena_local_123
      POSTGRES_DB: serena_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U serena -d serena_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis (Celery broker + result backend) ----
  redis:
    image: redis:7.2-alpine
    container_name: serena_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- FastAPI Application ----
  serena_api:
    <<: *app-common
    container_name: serena_api
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ---- Celery Worker (post-session emotional analysis) ----
  celery_worker:
    <<: *app-common
    container_name: serena_celery_worker
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - .:/app

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  postgres_data:
    driver: local
